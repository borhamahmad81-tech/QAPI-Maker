name: Build MR_FormFiller EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: List repository contents (diagnostic)
        run: |
          echo "=== Repo root ==="
          dir
          echo "=== Looking for requirements.txt ==="
          dir /s /b requirements.txt
          echo "=== Looking for app.py ==="
          dir /s /b app.py
        shell: cmd

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          if not exist requirements.txt (echo ERROR: requirements.txt not found in repo root && exit /b 1)
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify dependencies installed
        run: |
          python -c "import docx; print('python-docx OK', docx.__file__)"
          python -c "import openpyxl; print('openpyxl OK', openpyxl.__file__)"
          python -c "import tkinterdnd2; print('tkinterdnd2 OK', tkinterdnd2.__file__)"

      - name: Build EXE
        run: >
          pyinstaller --onefile --windowed --name MR_FormFiller
          --collect-all tkinterdnd2
          --collect-all docx
          --collect-all openpyxl
          --hidden-import docx
          --hidden-import openpyxl
          --add-data "core;core"
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MR_FormFiller-windows
          path: dist/MR_FormFiller.exe
