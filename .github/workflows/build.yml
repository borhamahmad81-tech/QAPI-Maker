name: Build MR_FormFiller EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify dependencies installed
        run: |
          python -c "import docx; print('python-docx OK', docx.__file__)"
          python -c "import openpyxl; print('openpyxl OK', openpyxl.__file__)"
          python -c "import tkinterdnd2; print('tkinterdnd2 OK', tkinterdnd2.__file__)"

      - name: Build EXE
        run: >
          pyinstaller --onefile --windowed --name MR_FormFiller
          --collect-all tkinterdnd2
          --collect-all docx
          --collect-all openpyxl
          --hidden-import docx
          --hidden-import openpyxl
          --add-data "core;core"
          app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MR_FormFiller-windows
          path: dist/MR_FormFiller.exe
